spec_version: 1
name: factcheckenv
type: environment
runtime: docker
app: server.app:app
port: 7860

description: >
  An OpenEnv environment for evaluating grounded question answering
  and fact verification using document-based reasoning.

author: Saurabh-Jaurat

tasks:
  - id: easy
    name: easy
    description: Retrieve the correct document for a given question
    grader: env.grader:grade_easy

  - id: medium
    name: medium
    description: Answer a question using provided documents
    grader: env.grader:grade_medium

  - id: hard
    name: hard
    description: Answer a question and cite the correct source with conflict resolution
    grader: env.grader:grade_hard