name: factcheckenv
description: >
  An OpenEnv environment for evaluating grounded question answering
  and fact verification using document-based reasoning.

version: 1.0

author: Saurabh-Jaurat

tasks:
  - name: easy
    description: Retrieve the correct document for a given question

  - name: medium
    description: Answer a question using provided documents

  - name: hard
    description: Answer a question and cite the correct source, handling conflicting information

observation_space:
  type: object
  properties:
    documents:
      type: array
      description: List of documents with id and text
    question:
      type: string
    history:
      type: array
      items:
        type: string

action_space:
  type: object
  properties:
    answer:
      type: string
    source:
      type: integer

reward:
  type: float
  range: [0.0, 1.0]
  description: >
    Reward is based on answer correctness, source correctness,
    and grounding of answer in provided documents.

environment:
  entry_point: env.environment:KnowledgeQAEnv